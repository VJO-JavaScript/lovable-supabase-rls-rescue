name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check source and release consistency
        run: npm run check

      - name: Run baseline and rescued evidence
        run: npm test

      - name: Publish evidence summary
        if: always()
        shell: bash
        run: |
          {
            echo '## RLS rescue evidence'
            echo
            echo '- Historical baseline: intentionally reproduced in an isolated synthetic database.'
            echo '- Hardened reads: anonymous denied; Alice and Bob isolated to their own tenant.'
            echo '- Hardened writes: tenant-scoped insert/update/delete with tenant-move protection.'
            echo '- Boundary: PostgreSQL/PGlite policy evidence, not hosted Supabase certification.'
          } >> "$GITHUB_STEP_SUMMARY"
